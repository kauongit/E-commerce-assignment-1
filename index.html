<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechMart E-Commerce</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; }
        header { background-color: #333; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: white; text-decoration: none; margin: 0 15px; font-weight: bold; }
        nav a:hover { color: #ff9800; }
        .categories { background-color: #e0e0e0; padding: 15px; text-align: center; }
        .categories span { margin: 0 10px; padding: 5px 10px; background: white; border-radius: 5px; cursor: pointer; }
        .product-section { padding: 20px; text-align: center; }
        .grid { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 20px; }
        .product-card { background: white; padding: 20px; border-radius: 8px; width: 200px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center; }
        .product-card img { width: 100%; height: 150px; background-color: #ddd; object-fit: cover; border-radius: 4px; }
        .price { color: #28a745; font-size: 1.2em; font-weight: bold; }
        .buy-btn { background-color: #007bff; color: white; border: none; padding: 10px; width: 100%; margin-top: 10px; cursor: pointer; border-radius: 4px; }
        .buy-btn:hover { background-color: #0056b3; }
        footer { background-color: #333; color: white; text-align: center; padding: 10px; margin-top: 20px; }
    </style>
</head>
<body>
    <header>
        <h2>TechMart</h2>
        <nav>
            <a href="#">Home</a>
            <a href="#">Shop</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <div class="categories">
        <strong>Categories:</strong>
        <span>Laptops</span> <span>Smartphones</span> <span>Headphones</span> <span>Accessories</span>
    </div>

    <section class="product-section">
        <h2>Featured Products</h2>
        <div class="grid">
            <div class="product-card">
                <img src="laptop.jpg" alt="Laptop">
                <h3>Pro Laptop</h3>
                <p class="price">$999</p>
                <button class="buy-btn">Add to Cart</button>
            </div>
            <div class="product-card">
                <img src="phone.jpg" alt="Smartphone">
                <h3>Smart Phone X</h3>
                <p class="price">$699</p>
                <button class="buy-btn">Add to Cart</button>
            </div>
            <div class="product-card">
                <img src="headphones.jpg" alt="Headphones">
                <h3>Wireless Earbuds</h3>
                <p class="price">$149</p>
                <button class="buy-btn">Add to Cart</button>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 TechMart. All Rights Reserved.</p>
    </footer>
</body>
</html>
